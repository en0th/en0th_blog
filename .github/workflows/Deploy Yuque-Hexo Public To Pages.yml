# 自动化名称
name: Deploy Yuque-Hexo Public To Pages

# 当有语雀推送时触发action
on: [push, repository_dispatch, workflow_dispatch]

  
# 设置环境
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      YUQUE_USERNAME: ${{ secrets.YUQUE_USERNAME }}
      YUQUE_PASSWORD: ${{ secrets.YUQUE_PASSWORD }}
      YUQUE_LOGIN: ${{ secrets.YUQUE_LOGIN }}
      YUQUE_REPO: ${{ secrets.YUQUE_REPO }}
    
    steps:
      # check it to your workflow can access it
      # from: https://github.com/actions/checkout
      - name: 检查分支
        uses: actions/checkout@master

      # from: https://github.com/actions/setup-node
      - name: 安装node环境
        uses: actions/setup-node@master
        with:
          node-version: ${{ matrix.node-version }}

      - name: 安装依赖
        run: |
          npm install hexo-cli -g
          npm install --prod
          hexo generate 
      - name: 缓存 Hexo
        uses: actions/cache@v3
        id: cache
        with:
          path: node_modules
          key: ${{runner.OS}}-${{hashFiles('**/package-lock.json')}}

      - name: 拉取文档
        run: |
          npm run elog:clean
          npm run elog:sync


      - name: 设置Git信息
        run: |
          git config --global user.name 'en0th' 
          git config --global user.email 'en0th@hotmail.com'      

      - name: 提交yuque拉取的文章到GitHub仓库
        run: |
          git config --global user.email "en0th@hotmail.com"
          git config --global user.name "en0th"
          echo `date +"%Y-%m-%d %H:%M:%S"` begin > time.txt
          git add .
          git commit -m "更新文档" -a

      - name: 推送文章到仓库
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}


      # - name: 部署到Github Pages       #此处master:master 指从本地的master分支提交到远程仓库的master分支，若远程仓库没有对应分支则新建一个。如有其他需要，可以根据自己的需求更改。
